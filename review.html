<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form Selection</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f2f4f7;
}

.page{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

h1{
    color:#4a5560;
    margin-bottom:50px;
    font-size:38px;
}

.card-container{
    display:flex;
    gap:40px;
}

.card{
    width:280px;
    height:170px;
    background:white;
    border-radius:10px;
    box-shadow:0 6px 16px rgba(0,0,0,0.12);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    cursor:pointer;
    transition:all .2s ease;
    position:relative;
    color:#4a5560;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 12px 24px rgba(0,0,0,0.15);
}

.card-content{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.card-title{
    font-size:22px;
    font-weight:600;
}

.card-sub{
    font-size:16px;
    margin-top:6px;
    color:#6b7280;
}

.employee::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:8px;
    background:#2b7dbd;
    border-top-left-radius:10px;
    border-top-right-radius:10px;
}

.manager::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:8px;
    background:#4aa54a;
    border-top-left-radius:10px;
    border-top-right-radius:10px;
}

</style>
</head>

<body>

<div class="page">

<h1>Select Who This Form Is For</h1>

<div class="card-container">

<div class="card employee" onclick="location.href='employee.html'">
<div class="card-content">
<div class="card-title">Employee</div>
</div>
</div>

<div class="card manager" onclick="location.href='manager.html'">
<div class="card-content">
<div class="card-title">Manager</div>
<div class="card-sub">Manages People</div>
</div>
</div>

</div>

</div>

</body>
</html>
